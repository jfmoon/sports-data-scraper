groups:
  cbb:    [espn, action_network, kenpom, evanmiya]
  tennis: [sofascore, the_odds_api, tennisabstract]

scrapers:
  espn:
    name: espn
    enabled: true
    sport: cbb
    bucket: sports-data-scraper-491116
    gcs_object: cbb/scores.json

  action_network:
    name: action_network
    enabled: true
    sport: cbb
    bucket: sports-data-scraper-491116
    gcs_object: cbb/odds.json

  kenpom:
    name: kenpom
    enabled: true
    sport: cbb
    bucket: sports-data-scraper-491116
    gcs_object: cbb/kenpom.json
    top: 68
    fanmatch: false
    fanmatch_date: null

  evanmiya:
    name: evanmiya
    enabled: false
    sport: cbb
    bucket: sports-data-scraper-491116
    gcs_object: cbb/evanmiya.json

  sofascore:
    name: sofascore
    enabled: false
    sport: tennis
    bucket: sports-data-scraper-491116
    gcs_object: tennis/matches.json

  the_odds_api:
    name: the_odds_api
    enabled: true
    sport: tennis
    bucket: sports-data-scraper-491116
    gcs_object: tennis/odds.json

  tennisabstract:
    name: tennisabstract
    enabled: true
    sport: tennis
    bucket: sports-data-scraper-491116
    gcs_object: tennis/players.json
    top: 250
    slug: null
    priority_players:
      - {name: "Jessica Pegula",       slug: "JessicaPegula"}
