groups:
  cbb:         [espn, action_network, kenpom, evanmiya, torvik]
  tennis:      [sofascore, the_odds_api, tennisabstract]
  sports_odds: [nba_odds, mlb_odds, nhl_odds, nfl_odds]

scrapers:

  # ---------------------------------------------------------------------------
  # CBB
  # ---------------------------------------------------------------------------

  espn:
    name: espn
    enabled: true
    sport: cbb
    bucket: sports-data-scraper-491116
    gcs_object: cbb/scores.json

  action_network:
    name: action_network
    enabled: true
    sport: cbb
    bucket: sports-data-scraper-491116
    gcs_object: cbb/odds.json

  kenpom:
    name: kenpom
    enabled: true
    sport: cbb
    bucket: sports-data-scraper-491116
    gcs_object: cbb/kenpom.json
    top: 150
    fanmatch: false
    fanmatch_date: null

  evanmiya:
    name: evanmiya
    enabled: true
    sport: cbb
    bucket: sports-data-scraper-491116
    gcs_object: cbb/evanmiya.json

  torvik:
    name: torvik
    enabled: true
    sport: cbb
    bucket: sports-data-scraper-491116
    gcs_object: cbb/torvik_team.json
    split_presets: [full_season, last_10]
    year: 2026

  # ---------------------------------------------------------------------------
  # Tennis
  # ---------------------------------------------------------------------------

  sofascore:
    name: sofascore
    enabled: false
    sport: tennis
    bucket: sports-data-scraper-491116
    gcs_object: tennis/matches.json

  the_odds_api:
    name: the_odds_api
    enabled: true
    sport: tennis
    bucket: sports-data-scraper-491116
    gcs_object: tennis/odds.json

  tennisabstract:
    name: tennisabstract
    enabled: true
    sport: tennis
    bucket: sports-data-scraper-491116
    gcs_object: tennis/players.json
    top: 250
    slug: null
    priority_players:
      - {name: "Jessica Pegula",       slug: "JessicaPegula"}
      - {name: "Amanda Anisimova",     slug: "AmandaAnisimova"}
      - {name: "Naomi Osaka",          slug: "NaomiOsaka"}
      - {name: "Belinda Bencic",       slug: "BelindaBencic"}
      - {name: "Linda Noskova",        slug: "LindaNoskova"}
      - {name: "Qinwen Zheng",         slug: "QinwenZheng"}
      - {name: "Clara Tauson",         slug: "ClaraTauson"}
      - {name: "Eva Lys",              slug: "EvaLys"}
      - {name: "Alexandra Eala",       slug: "AlexandraEala"}
      - {name: "Jaqueline Cristian",   slug: "JaquelineCristian"}
      - {name: "Leylah Fernandez",     slug: "LeylahFernandez"}
      - {name: "Emma Raducanu",        slug: "EmmaRaducanu"}
      - {name: "Camila Osorio",        slug: "CamilaOsorio"}
      - {name: "Olga Danilovic",       slug: "OlgaDanilovic"}
      - {name: "Lilli Tagger",         slug: "LilliTagger"}
      - {name: "Ajla Tomljanovic",     slug: "AjlaTomljanovic"}
      - {name: "Cristina Bucsa",       slug: "CristinaBucsa"}
      - {name: "Oksana Selekhmeteva",  slug: "OksanaSelekhmeteva"}
      - {name: "Kamilla Rakhimova",    slug: "KamillaRakhimova"}
      - {name: "Simona Waltert",       slug: "SimonaWaltert"}
      - {name: "Brenda Fruhvirtova",   slug: "BrendaFruhvirtova"}
      - {name: "Emiliana Arango",      slug: "EmilianaArango"}
      - {name: "Barbora Palicova",     slug: "BarboraPalicova"}
      - {name: "Dalayna Hewitt",       slug: "DalaynaHewitt"}
      - {name: "Ekaterina Reyngold",   slug: "EkaterinaReyngold"}
      - {name: "Yuliia Starodubtseva", slug: "YuliiaStarodubtseva"}
      - {name: "Wakana Sonobe",        slug: "WakanaSonobe"}
    # Players with sparse/inactive TA pages — failures logged as warnings not errors
    optional_players:
      - {name: "McCartney Kessler", slug: "McCartneKessler"}
      - {name: "Danielle Collins",  slug: "DanielleCollins"}
      - {name: "Sloane Stephens",   slug: "SloaneStephens"}
      - {name: "Sofia Kenin",       slug: "SofiaKenin"}

  # ---------------------------------------------------------------------------
  # Sports odds (NBA, MLB, NHL, NFL) via Action Network
  # ---------------------------------------------------------------------------

  nba_odds:
    name: nba_odds
    enabled: true
    sport: nba
    bucket: sports-data-scraper-491116
    gcs_object: nba/odds.json
    primary_book_id: 15

  mlb_odds:
    name: mlb_odds
    enabled: true
    sport: mlb
    bucket: sports-data-scraper-491116
    gcs_object: mlb/odds.json
    primary_book_id: 15

  nhl_odds:
    name: nhl_odds
    enabled: true
    sport: nhl
    bucket: sports-data-scraper-491116
    gcs_object: nhl/odds.json
    primary_book_id: 15

  nfl_odds:
    name: nfl_odds
    enabled: true
    sport: nfl
    bucket: sports-data-scraper-491116
    gcs_object: nfl/odds.json
    primary_book_id: 15
 
  # ---------------------------------------------------------------------------
  # MLB
  # ---------------------------------------------------------------------------
  mlb_probables:
    name: mlb_probables
    enabled: true
    sport: mlb
    bucket: sports-data-scraper-491116
    gcs_object: mlb/probables.json
    days_ahead: 2
 
  mlb_pitchers:
    name: mlb_pitchers
    enabled: true
    sport: mlb
    bucket: sports-data-scraper-491116
    gcs_object: mlb/pitchers.json
    min_ip: 10
    # season: 2026
 
  mlb_teams:
    name: mlb_teams
    enabled: true
    sport: mlb
    bucket: sports-data-scraper-491116
    gcs_object: mlb/teams.json
    # season: 2026
 
  mlb_bullpen:
    name: mlb_bullpen
    enabled: true
    sport: mlb
    bucket: sports-data-scraper-491116
    gcs_object: mlb/bullpen.json
    min_ip: 20
    # season: 2026
 
  mlb_statcast_pitchers:
    name: mlb_statcast_pitchers
    enabled: true
    sport: mlb
    bucket: sports-data-scraper-491116
    gcs_object: mlb/statcast_pitchers.json
    min_pa: 20
    # season: 2026
 
  mlb_statcast_hitters:
    name: mlb_statcast_hitters
    enabled: true
    sport: mlb
    bucket: sports-data-scraper-491116
    gcs_object: mlb/statcast_hitters.json
    min_pa: 20
    # season: 2026
 
  mlb_weather:
    name: mlb_weather
    enabled: true
    sport: mlb
    bucket: sports-data-scraper-491116
    gcs_object: mlb/weather.json
    days_ahead: 2
    game_hour: 19
    # MLB_WEATHER_PROVIDER env var: "open_meteo" (default, no API key required)
 
  mlb_lineups:
    name: mlb_lineups
    enabled: true
    sport: mlb
    bucket: sports-data-scraper-491116
    gcs_object: mlb/lineups.json
    days_ahead: 1